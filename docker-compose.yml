services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - DB_PATH=data/statements.db
      - RULES_PATH=config/classification_rules.json
      - UPLOAD_DIR=uploads
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
